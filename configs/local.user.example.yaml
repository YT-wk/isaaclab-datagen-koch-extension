# Copy this file to `configs/local.user.local.yaml` and edit the values below.
leader_arm:
  serial_port: COM5
  baudrate: 1000000
  sample_hz: 60.0
  read_timeout_ms: 300
  read_retries: 2
  read_retry_delay: 0.01
  max_consecutive_read_failures: 5
  serial_reconnect_backoff: 1.0

ssh:
  host: your.cloud.host
  port: 31339
  username: root
  # Option 1: write the password here for a local-only config file.
  password: null
  # Option 2: keep password null and put the password in this environment variable.
  # This field is the variable name, not the actual password.
  password_env: KOCH_SSH_PASSWORD
  remote_stream_host: 127.0.0.1
  remote_stream_port: 55000

logging:
  local_jsonl_path: ./logs/koch_leader_stream.jsonl
  cleanup_local_jsonl_on_exit: true

